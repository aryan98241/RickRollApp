name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Set up Java JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Initialize and Sync Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Create a clean web asset directory and move the app files into it
        mkdir www
        cp index.html app.js rickroll.mp3 www/
        
        # Initialize Capacitor pointing exactly to the web folder
        npx cap init "System Update" "com.prank.rickroll" --web-dir=www
        npx cap add android
        npx cap sync android

    - name: Build APK with Gradle
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Upload Output APK
      uses: actions/upload-artifact@v4
      with:
        name: prank-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

