name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize and Sync Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html app.js rickroll.mp3 www/ 2>/dev/null || true
          npx cap init "System Update" "com.prank.rickroll" --web-dir=www
          npx cap add android
          
          # Force clean SDK 35 configurations natively
          if [ -f android/variables.gradle ]; then
            sed -i 's/compileSdkVersion =.*/compileSdkVersion = 35/' android/variables.gradle
            sed -i 's/targetSdkVersion =.*/targetSdkVersion = 35/' android/variables.gradle
          fi
          
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          
          # Downgrade seamlessly to stable Gradle 8.4 to support Capacitor bindings
          ./gradlew wrapper --gradle-version 8.4
          
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Output APK
        uses: actions/upload-artifact@v4
        with:
          name: prank-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

