name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Initialize and Sync Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp index.html app.js rickroll.mp3 www/
          npx cap init "System Update" "com.prank.rickroll" --web-dir=www
          npx cap add android
          
          # Force stable compilation SDK and build tool variables
          sed -i 's/compileSdkVersion =.*/compileSdkVersion = 34/' android/variables.gradle
          sed -i 's/targetSdkVersion =.*/targetSdkVersion = 34/' android/variables.gradle
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|' gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Output APK
        uses: actions/upload-artifact@v4
        with:
          name: prank-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

